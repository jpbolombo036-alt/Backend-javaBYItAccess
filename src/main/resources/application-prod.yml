# PostgreSQL Configuration (Production - Railway)
spring:
  application:
    name: medical-prescription-management
  datasource:
    url: ${JDBC_DATABASE_URL:${DATABASE_URL}}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:${PGUSER:${DATABASE_USERNAME:${DB_USER}}}
    password: ${POSTGRES_PASSWORD:${PGPASSWORD:${DATABASE_PASSWORD:${DB_PASSWORD}}}}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      initialization-fail-timeout: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    connect-retries: 10
    validate-on-migrate: false
    out-of-order: false
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: never

# Server Configuration
server:
  port: ${PORT:8080}

# Logging
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.postgresql: INFO

# Swagger UI Configuration (disabled in production)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: false