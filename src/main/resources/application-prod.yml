# PostgreSQL Configuration (Production - Railway)
spring:
  application:
    name: medical-prescription-management
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:medicaldb}}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
  h2:
    console:
      enabled: false

# Server Configuration
server:
  port: ${PORT:8080}

# Logging
logging:
  level:
    root: INFO
    org.springframework.web: INFO

# Swagger UI Configuration (enabled for testing)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true